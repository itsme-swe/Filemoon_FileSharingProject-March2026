<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>

</head>

<body>
  <div class="bg-gray-100 h-screen">

    <aside class="space-y-6 py-6 bg-linear-to-t from-sky-500 to-indigo-500/60 fixed top-0 left-0  h-full" id="sidebar"
      style="width: 250px; transition: 0.4s ;">

      <div class="flex flex-col items-center">
        <img src="../avt.png" width="80" id="profile-img" alt="profile picture" onclick="uploadProfileImage()">
        <h1 class="text-ld font-semibold text-white capitalize" id="fullname"></h1>
        <p class="text-ld text-gray-100" id="email"></p>
      </div>

      <div class="px-6 flex flex-col gap-4">
        <a href="./dashboard">
          <button class="w-full bg-rose-600/70 text-white py-2.5 rounded hover:bg-rose-600">
            <i class=" ri-apps-line"></i>
            <label>Dashboard</label>
          </button>
        </a>

        <a href="./files">
          <button class="w-full bg-rose-600/70 text-white py-2.5 rounded hover:bg-rose-600">
            <i class="ri-hard-drive-3-fill"></i>
            <label>My Storage</label>
          </button>
        </a>

        <a href="./history">
          <button class="w-full bg-rose-600/70 text-white py-2.5 rounded hover:bg-rose-600">
            <i class="ri-history-fill"></i>
            <label>History</label>
          </button>
        </a>

        <button class="w-full bg-rose-600/70 text-white py-2.5 rounded hover:bg-rose-600" onclick="logout()">
          <i class="ri-logout-circle-r-line"></i>
          <label>Logout</label>
        </button>

      </div>
    </aside>

    <section class="" id="section" style="margin-left: 250px; transition: 0.4s ;">
      <nav class="bg-white px-6 py-4 w-full shadow-lg flex justify-between items-center">
        <div class="flex items-center gap-3">
          <i class="ri-contrast-2-fill text-4xl text-violet-700"></i>
          <h1 class="text-2xl font-semibold">Filemoon</h1>
        </div>

        <div class="space-x-2">
          <button class="bg-gray-100 px-3 -y-2 rounded hover:bg-gray-300" onclick="logout()">
            <i class="ri-logout-circle-r-line"></i>
          </button>

          <button onclick="toggleSidebar()" class="bg-gray-100 px-3 -y-2 rounded hover:bg-gray-300">
            <i class="ri-menu-2-line"></i>
          </button>
        </div>
      </nav>
      <div class="p-6 space-y-4">
        <h1 class="text-lg font-medium">Dashboard</h1>
        <div id="report-card" class="grid grid-cols-4 gap-8 mb-8">

        </div>
        <div class="grid grid-cols-4 gap-8">
          <div class="col-span-2 overflow-hidden relative bg-white rounded-lg shadow hover:shadow-lg p-6 space-y-3">
            <h1 class="text-lg text-black font-semibold  border-b pb-4 border-gray-100">Recent Files</h1>
            <div class="space-y-4" id="recent-files-box">

            </div>
          </div>

          <div class="col-span-2 overflow-hidden relative bg-white rounded-lg shadow hover:shadow-lg p-6 space-y-3">
            <h1 class="text-lg text-black font-semibold  border-b pb-4 border-gray-100">Recent Shared</h1>
            <div class="space-y-4" id="recent-shared-box">

            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="../js/env.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/dashboard.js"></script>

</body>

</html>
